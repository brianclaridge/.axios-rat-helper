version: '3'

vars:
  BINARY: ./target/release/axios-rat-scan{{if eq OS "windows"}}.exe{{end}}
  CLAUDE_MODEL: "claude-opus-4-6[1m]"
  STATUSLINE_PLUGIN: "{{toSlash .ROOT_DIR}}/.claude/statusline"
  CLAUDE_CONFIG_DIR: "{{toSlash .TASKFILE_DIR}}/.data/claude/config"
  CLAUDE_CODE_TMPDIR: "{{toSlash .TASKFILE_DIR}}/.data/claude/tmp"

env:
  CLAUDE_CONFIG_DIR: "{{.CLAUDE_CONFIG_DIR}}"
  CLAUDE_CODE_TMPDIR: "{{.CLAUDE_CODE_TMPDIR}}"
  DISABLE_AUTOUPDATER: "1"

tasks:
  default:
    cmds:
      - task --list

  claude:
    desc: "resume or start claude session"
    aliases:
      - local
    vars:
      ARGS: >-
        --ide
        --chrome
        --model {{.CLAUDE_MODEL}}
        --effort high
        --brief
        --remote-control
        --verbose
        --plugin-dir {{.STATUSLINE_PLUGIN}}
    cmds:
      - claude update 2>/dev/null
      - claude {{.ARGS}} --continue 2>/dev/null || claude {{.ARGS}}
    ignore_error: true
    interactive: true
    silent: true

  build:
    desc: Build the scanner in release mode
    cmds:
      - cargo build --release

  build-dev:
    desc: Build in debug mode (faster compile)
    cmds:
      - cargo build

  scan:
    desc: Auto-detect and scan all mounted drives
    deps: [build]
    cmds:
      - '{{.BINARY}}'

  scan-fast:
    desc: Scan all drives, stop at first critical finding
    deps: [build]
    cmds:
      - '{{.BINARY}} --fast'

  scan-json:
    desc: Scan all drives with JSON output
    deps: [build]
    cmds:
      - '{{.BINARY}} --json'

  scan-quiet:
    desc: Scan without process/network checks (filesystem only)
    deps: [build]
    cmds:
      - '{{.BINARY}} --no-process'

  scan-path:
    desc: "Scan a specific path (usage: task scan-path -- /some/path)"
    deps: [build]
    cmds:
      - '{{.BINARY}} {{.CLI_ARGS}}'

  report:
    desc: Scan all drives and save JSON report
    deps: [build]
    cmds:
      - '{{.BINARY}} --json > scan_report.json'
      - echo "Report saved to scan_report.json"

  clean:
    desc: Remove build artifacts
    cmds:
      - cargo clean
      - rm -f npm_sources_map.yml scan_report.json

  check:
    desc: Run cargo check (fast compile validation)
    cmds:
      - cargo check

  lint:
    desc: Run clippy lints
    cmds:
      - cargo clippy -- -W clippy::all

  test:
    desc: Build + run integration tests in Docker (compiles Linux binary, plants IOCs, verifies detection, records GIF)
    cmds:
      - docker build -t axios-rat-test -f test/Dockerfile .
      - docker run --rm -v "{{.ROOT_DIR}}:/output" axios-rat-test

  test-interactive:
    desc: Shell into the test container for debugging
    cmds:
      - docker build -t axios-rat-test -f test/Dockerfile .
      - docker run --rm -it -v "{{.ROOT_DIR}}:/output" --entrypoint /bin/bash axios-rat-test
